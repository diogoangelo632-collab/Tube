<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #ffffff; }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%; height: 56px;
            background: white; display: flex; justify-content: space-between;
            align-items: center; padding: 0 16px; z-index: 1000;
        }
        .logo { font-weight: bold; color: red; font-size: 20px; cursor: pointer; text-decoration: none; }

        /* LAYOUT PRINCIPAL */
        .container { display: flex; margin-top: 56px; }

        /* SIDEBAR (Solo visible en Home) */
        nav { width: 240px; height: calc(100vh - 56px); position: sticky; top: 56px; padding: 12px; }
        nav li { list-style: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        nav li:hover { background: #f2f2f2; }

        /* VISTA DE REPRODUCCIÓN (Oculta al inicio) */
        #watch-page { display: none; width: 100%; padding: 24px; display: flex; gap: 24px; }
        .video-player-container { flex: 3; }
        .video-player-container iframe { width: 100%; aspect-ratio: 16/9; border-radius: 12px; border: none; }
        .recommendations { flex: 1; }

        /* CUADRÍCULA DE INICIO */
        #home-page { flex: 1; padding: 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        .video-card { cursor: pointer; }
        .thumb { width: 100%; border-radius: 12px; transition: 0.2s; }
        .video-card:hover .thumb { border-radius: 0; }
        .info { display: flex; gap: 10px; margin-top: 10px; }
        .info h3 { font-size: 14px; color: #0f0f0f; line-height: 20px; }
        .info p { font-size: 12px; color: #606060; }

        /* RECOMENDACIONES PEQUEÑAS (Lado derecho) */
        .rec-card { display: flex; gap: 8px; margin-bottom: 12px; cursor: pointer; }
        .rec-card img { width: 168px; height: 94px; border-radius: 8px; object-fit: cover; }
        .rec-card h4 { font-size: 14px; line-height: 18px; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="showHome()">YouTube<sup>ES</sup></a>
        <div style="border: 1px solid #ccc; padding: 5px 15px; border-radius: 20px; width: 40%;">Buscar...</div>
        <div>👤</div>
    </header>

    <div class="container">
        <!-- Barra lateral izquierda -->
        <nav id="sidebar">
            <li onclick="showHome()">🏠 Inicio</li>
            <li>🎞️ Shorts</li>
            <li>📺 Suscripciones</li>
        </nav>

        <!-- Página de Inicio (Cuadrícula) -->
        <main id="home-page">
            <!-- Los videos se cargan con JS -->
        </main>

        <!-- Página de Reproducción (Watch) -->
        <main id="watch-page">
            <div class="video-player-container">
                <div id="player"></div>
                <h2 id="video-title" style="margin-top:15px; font-size: 20px;">Título del video</h2>
                <p id="video-meta" style="color: #606060; font-size: 14px; margin-top: 8px;">1.2M vistas • 2026</p>
            </div>
            <div class="recommendations" id="next-videos">
                <!-- Videos sugeridos -->
            </div>
        </main>
    </div>

    <script>
        const videos = [
            { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up', author: 'RickAstleyVEVO', views: '1.5B' },
            { id: 'jNQXAC9IVRw', title: 'Me at the zoo', author: 'jawed', views: '300M' },
            { id: '9bZkp7q19f0', title: 'PSY - GANGNAM STYLE', author: 'officialpsy', views: '5B' },
            { id: 'L_jWHffIx5E', title: 'Smash Mouth - All Star', author: 'SmashMouthVEVO', views: '500M' }
        ];

        function loadHome() {
            const home = document.getElementById('home-page');
            home.innerHTML = videos.map(v => `
                <div class="video-card" onclick="playVideo('${v.id}', '${v.title}')">
                    <img src="https://img.youtube.com{v.id}/maxresdefault.jpg" class="thumb">
                    <div class="info">
                        <div style="width:36px; height:36px; background:#ccc; border-radius:50%"></div>
                        <div>
                            <h3>${v.title}</h3>
                            <p>${v.author}</p>
                            <p>${v.views} vistas</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function playVideo(id, title) {
            // Ocultar inicio y sidebar, mostrar reproductor
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('sidebar').style.display = 'none';
            document.getElementById('watch-page').style.display = 'flex';

            // Cargar Video
            document.getElementById('player').innerHTML = `
                <iframe src="https://www.youtube.com{id}?autoplay=1" allowfullscreen allow="autoplay"></iframe>
            `;
            document.getElementById('video-title').innerText = title;

            // Cargar recomendaciones a la derecha
            const recs = document.getElementById('next-videos');
            recs.innerHTML = '<h3>Siguientes</h3><br>' + videos.filter(v => v.id !== id).map(v => `
                <div class="rec-card" onclick="playVideo('${v.id}', '${v.title}')">
                    <img src="https://img.youtube.com{v.id}/mqdefault.jpg">
                    <div>
                        <h4>${v.title}</h4>
                        <p style="font-size:12px; color:#606060">${v.author}</p>
                    </div>
                </div>
            `).join('');
            
            window.scrollTo(0,0);
        }

        function showHome() {
            document.getElementById('home-page').style.display = 'grid';
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('watch-page').style.display = 'none';
            document.getElementById('player').innerHTML = ''; // Detener video
        }

        // Iniciar
        loadHome();
    </script>
</body>
</html>
