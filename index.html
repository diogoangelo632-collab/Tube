<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tube - Red Social</title>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; }
        header { position: fixed; top: 0; width: 100%; height: 56px; background: #0f0f0f; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 1000; border-bottom: 1px solid #222; }
        .yt-icon { width: 30px; height: 22px; background: #ff0000; border-radius: 6px; display: flex; justify-content: center; align-items: center; margin-right: 6px; }
        .yt-icon::after { content: ""; border-left: 8px solid white; border-top: 5px solid transparent; border-bottom: 5px solid transparent; margin-left: 2px; }
        .logo-text { font-size: 1.25rem; font-weight: bold; }
        .btn { border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-red { background: #cc0000; color: white; }
        .btn-sub { background: white; color: black; margin-left: 10px; }
        .btn-sub.active { background: #333; color: white; }
        #userBadge { color: #3ea6ff; font-weight: bold; cursor: pointer; text-decoration: underline; margin-right: 15px; }
        main { padding-top: 80px; max-width: 1100px; margin: 0 auto; padding-inline: 20px; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; height: 100%; }
        .video-info { margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; margin-bottom: 40px; }
        .card { cursor: pointer; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid transparent; background-size: cover; background-position: center; }
        .gold-border { border: 2px solid #ffd700 !important; box-shadow: 0 0 10px #ffd700; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        input { background: #121212; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; }
        #achievement { display: none; position: fixed; top: 70px; right: 20px; background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 15px 25px; border-radius: 10px; font-weight: bold; z-index: 3000; }
    </style>
</head>
<body>

<div id="achievement">🏆 ¡Logro! Conseguiste 100 likes en este video</div>

<header>
    <div class="logo-container" onclick="location.reload()">
        <div class="yt-icon"></div>
        <div class="logo-text">Tube</div>
    </div>
    <div>
        <span id="userBadge" onclick="showStats()"></span>
        <button id="authBtn" class="btn" style="border:1px solid #3ea6ff; color:#3ea6ff; background:none" onclick="openModal('authModal')">Crear cuenta</button>
        <button id="uploadBtn" class="btn btn-red" style="display:none; margin-left:10px;" onclick="openModal('uploadModal')">Subir</button>
    </div>
</header>

<main>
    <div class="video-wrapper">
        <video id="mainPlayer" controls onended="addCloudView()"></video>
    </div>
    <div class="video-info">
        <div>
            <h1 id="displayTitle">Bienvenido</h1>
            <p id="displayVistas" style="color:#aaa; font-size: 0.85rem; margin-top: 4px;">-- vistas • Canal: <span id="displayAuthor">--</span></p>
        </div>
        <div style="display:flex; align-items:center;">
            <button class="btn" style="background:#272727; color:white;" onclick="addCloudLike()">👍 <span id="likeDisplay">0</span></button>
            <button id="subBtn" class="btn btn-sub" onclick="toggleSub()">Suscribirse</button>
        </div>
    </div>

    <h3 style="margin-top:25px">Videos Globales (Tendencias)</h3>
    <div class="grid" id="globalGrid"></div>
</main>

<!-- Modales -->
<div id="authModal" class="modal"><div class="modal-box"><h3>Nombre del Canal</h3><input type="text" id="username"><button class="btn btn-red" onclick="register()">Aceptar</button></div></div>
<div id="uploadModal" class="modal"><div class="modal-box"><h3>Subir a la Nube</h3><input type="text" id="vTitle" placeholder="Título"><input type="file" id="vFile" accept="video/*"><button id="publishBtn" class="btn btn-red" onclick="publishCloud()">Publicar</button></div></div>
<div id="statsModal" class="modal"><div class="modal-box"><h2 id="statsName">Canal</h2><p style="font-size: 1.2rem; margin: 10px 0;">Likes Totales: <span id="totalLikes" style="color:#ffd700">0</span></p><button class="btn btn-red" onclick="closeModal('statsModal')">Cerrar</button></div></div>

<script>
    // CONFIGURACIÓN FIREBASE (REEMPLAZA CON TUS DATOS)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        projectId: "TU_PROYECTO",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "ID",
        appId: "ID_APP"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let currentVideoDoc = null;
    let currentUser = localStorage.getItem('tubeUser');
    let mySubs = JSON.parse(localStorage.getItem('tubeSubs') || "[]");

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function register() {
        const u = document.getElementById('username').value;
        if(u) { localStorage.setItem('tubeUser', u); location.reload(); }
    }

    async function publishCloud() {
        const f = document.getElementById('vFile').files[0];
        const t = document.getElementById('vTitle').value;
        if(!f || !t) return alert("Faltan datos");

        document.getElementById('publishBtn').innerText = "Subiendo...";
        const ref = storage.ref().child(`videos/${Date.now()}_${f.name}`);
        await ref.put(f);
        const url = await ref.getDownloadURL();

        await db.collection("globalVideos").add({
            title: t, url: url, author: currentUser,
            timestamp: Date.now(), likes: 0, views: 0
        });
        location.reload();
    }

    function loadVideos() {
        db.collection("globalVideos").orderBy("timestamp", "desc").onSnapshot(snap => {
            const grid = document.getElementById('globalGrid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const v = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => playVideo(doc.id, v);
                const gold = v.likes >= 100 ? 'gold-border' : '';
                card.innerHTML = `<div class="thumb ${gold}" style="background:#222">▶</div>
                                  <h4>${v.title}</h4><p>${formatViews(v.views)} vistas • ${v.author}</p>`;
                grid.appendChild(card);
            });
        });
    }

    function playVideo(id, v) {
        currentVideoDoc = id;
        const p = document.getElementById('mainPlayer');
        p.src = v.url;
        document.getElementById('displayTitle').innerText = v.title;
        document.getElementById('displayAuthor').innerText = v.author;
        document.getElementById('likeDisplay').innerText = v.likes;
        document.getElementById('displayVistas').innerText = `${v.views} vistas • Canal: ${v.author}`;
        
        // Actualizar botón suscripción
        const subBtn = document.getElementById('subBtn');
        if(mySubs.includes(v.author)) { subBtn.innerText = "Suscrito"; subBtn.classList.add('active'); }
        else { subBtn.innerText = "Suscribirse"; subBtn.classList.remove('active'); }
        
        p.play();
        window.scrollTo(0,0);
    }

    async function addCloudLike() {
        if(!currentVideoDoc) return;
        const ref = db.collection("globalVideos").doc(currentVideoDoc);
        const doc = await ref.get();
        const newLikes = doc.data().likes + 1;
        await ref.update({ likes: newLikes });
        if(newLikes === 100) showAchiev();
        document.getElementById('likeDisplay').innerText = newLikes;
    }

    async function addCloudView() {
        if(!currentVideoDoc) return;
        const ref = db.collection("globalVideos").doc(currentVideoDoc);
        const doc = await ref.get();
        await ref.update({ views: doc.data().views + 1 });
    }

    function toggleSub() {
        const author = document.getElementById('displayAuthor').innerText;
        if(author === "--") return;
        if(mySubs.includes(author)) {
            mySubs = mySubs.filter(s => s !== author);
        } else {
            mySubs.push(author);
        }
        localStorage.setItem('tubeSubs', JSON.stringify(mySubs));
        location.reload();
    }

    function formatViews(n) { return n >= 1000000 ? (n/1000000).toFixed(1)+' M' : (n/1000).toFixed(0)+' k'; }
    function showAchiev() { document.getElementById('achievement').style.display='block'; setTimeout(()=>document.getElementById('achievement').style.display='none', 5000); }

    window.onload = () => {
        if(currentUser) {
            document.getElementById('userBadge').innerText = currentUser;
            document.getElementById('authBtn').style.display='none';
            document.getElementById('uploadBtn').style.display='inline-block';
        }
        loadVideos();
    };
</script>
</body>
</html>
