<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tube - Mi Canal y Videos Infinitos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; }
        header { position: fixed; top: 0; width: 100%; height: 56px; background: #0f0f0f; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 1000; border-bottom: 1px solid #222; }
        .yt-icon { width: 30px; height: 22px; background: #ff0000; border-radius: 6px; display: flex; justify-content: center; align-items: center; margin-right: 6px; }
        .yt-icon::after { content: ""; border-left: 8px solid white; border-top: 5px solid transparent; border-bottom: 5px solid transparent; margin-left: 2px; }
        .logo-text { font-size: 1.25rem; font-weight: bold; cursor: pointer; }
        .btn { border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-red { background: #cc0000; color: white; }
        #userBadge { color: #3ea6ff; font-weight: bold; cursor: pointer; text-decoration: underline; margin-right: 10px; }
        
        main { padding-top: 80px; max-width: 1100px; margin: 0 auto; padding-inline: 20px; }
        .video-wrapper { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; height: 100%; }

        .video-actions { margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .like-btn { background:#272727; border-radius:20px; padding:8px 15px; border:none; color:white; cursor:pointer; }

        .comments-section { margin-top: 20px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .comment-input { width: 100%; background: none; border: none; border-bottom: 1px solid #333; color: white; padding: 10px 0; outline: none; margin-bottom: 15px; }
        .comment-item { margin-bottom: 15px; background: #111; padding: 12px; border-radius: 8px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; margin-bottom: 40px; }
        .card { cursor: pointer; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid transparent; background-size: cover; background-position: center; }
        .gold-border { border: 2px solid #ffd700 !important; box-shadow: 0 0 10px #ffd700; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 95%; max-width: 800px; display: flex; flex-direction: column; gap: 15px; text-align: center; max-height: 80vh; overflow-y: auto; }
        input { background: #121212; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; }
        
        #achievement { display: none; position: fixed; top: 70px; right: 20px; background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 15px 25px; border-radius: 10px; font-weight: bold; z-index: 3000; animation: slideIn 0.5s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="achievement">🏆 ¡Logro! Conseguiste 100 likes en este video</div>

<header>
    <div class="logo-container" onclick="location.reload()">
        <div class="yt-icon"></div>
        <div class="logo-text">Tube</div>
    </div>
    <div>
        <span id="userBadge" onclick="showMyChannel()"></span>
        <button id="authBtn" class="btn" style="border:1px solid #3ea6ff; color:#3ea6ff; background:none" onclick="openModal('authModal')">Crear cuenta</button>
        <button id="uploadBtn" class="btn btn-red" style="display:none; margin-left:10px;" onclick="openModal('uploadModal')">Subir</button>
    </div>
</header>

<main>
    <div class="video-wrapper">
        <video id="mainPlayer" controls onended="markAsWatched()"></video>
    </div>
    <div class="video-actions">
        <div><h1 id="displayTitle">Cargando...</h1><p id="displayVistas" style="color:#aaa; font-size: 0.85rem;">0 vistas • --</p></div>
        <button class="like-btn" onclick="saveLike()">👍 <span id="likeDisplay">0</span></button>
    </div>
    <div id="commentsArea" style="display:none; margin-top:20px;">
        <h3>Comentarios</h3>
        <input type="text" id="commentInput" class="comment-input" placeholder="Añade un comentario..." onkeypress="if(event.key === 'Enter') postComment()">
        <div id="commentsList"></div>
    </div>
    <h3>Tendencias Globales</h3>
    <div class="grid" id="recommendGrid"></div>
</main>

<!-- MODAL MI CANAL (TODOS LOS VIDEOS) -->
<div id="channelModal" class="modal">
    <div class="modal-box">
        <h2 id="channelName">Mi Canal</h2>
        <p>Total de Likes: <span id="totalLikes" style="color:#ffd700">0</span></p>
        <div class="grid" id="channelVideosGrid"></div>
        <button class="btn btn-red" onclick="closeModal('channelModal')">Cerrar</button>
    </div>
</div>

<div id="authModal" class="modal"><div class="modal-box"><h3>Nombre Canal</h3><input type="text" id="username"><button class="btn btn-red" onclick="register()">Aceptar</button></div></div>
<div id="uploadModal" class="modal"><div class="modal-box"><h3>Subir</h3><input type="text" id="vTitle"><input type="file" id="vFile" accept="video/*"><button id="publishBtn" class="btn btn-red" onclick="publish()">Publicar</button></div></div>

<script>
    let db, currentVideoId = null;
    const request = indexedDB.open("TubeDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("videos")) db.createObjectStore("videos", { keyPath: "id" });
    };
    request.onsuccess = e => { db = e.target.result; init(); };

    function init() {
        const u = localStorage.getItem('tubeUser');
        if(u) {
            document.getElementById('userBadge').innerText = u;
            document.getElementById('authBtn').style.display = 'none';
            document.getElementById('uploadBtn').style.display = 'inline-block';
            document.getElementById('displayTitle').innerText = "Selecciona un video de tu canal";
        }
        for(let i=0; i<8; i++) addMoreVideos();
    }

    function register() {
        const u = document.getElementById('username').value;
        if(u) { localStorage.setItem('tubeUser', u); location.reload(); }
    }

    function publish() {
        const f = document.getElementById('vFile').files;
        const t = document.getElementById('vTitle').value;
        if(f && t) {
            const transaction = db.transaction(["videos"], "readwrite");
            transaction.objectStore("videos").add({ id: Date.now(), title: t, file: f[0], timestamp: Date.now(), likes: 0, views: 0, comments: [] });
            transaction.oncomplete = () => location.reload();
        }
    }

    function showMyChannel() {
        const grid = document.getElementById('channelVideosGrid');
        grid.innerHTML = "";
        let total = 0;
        db.transaction(["videos"]).objectStore("videos").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                const v = cursor.value;
                total += v.likes;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => { playVideo(v.id); closeModal('channelModal'); };
                const gold = v.likes >= 100 ? 'gold-border' : '';
                card.innerHTML = `<div class="thumb ${gold}" style="background:#222">▶</div><h4>${v.title}</h4><p>${v.likes} likes</p>`;
                grid.prepend(card);
                cursor.continue();
            } else {
                document.getElementById('totalLikes').innerText = total;
                openModal('channelModal');
            }
        };
    }

    function playVideo(id) {
        db.transaction(["videos"]).objectStore("videos").get(id).onsuccess = e => {
            const v = e.target.result;
            currentVideoId = v.id;
            document.getElementById('mainPlayer').src = URL.createObjectURL(v.file);
            document.getElementById('displayTitle').innerText = v.title;
            document.getElementById('displayVistas').innerText = `${v.views} vistas • ${getTimeAgo(v.timestamp)}`;
            document.getElementById('likeDisplay').innerText = v.likes;
            document.getElementById('commentsArea').style.display = 'block';
            renderComments(v.comments || []);
            document.getElementById('mainPlayer').play();
            window.scrollTo(0,0);
        };
    }

    function postComment() {
        const text = document.getElementById('commentInput').value;
        const user = localStorage.getItem('tubeUser') || "Anónimo";
        if(!text || !currentVideoId) return;
        const store = db.transaction(["videos"], "readwrite").objectStore("videos");
        store.get(currentVideoId).onsuccess = e => {
            const v = e.target.result;
            if(!v.comments) v.comments = [];
            v.comments.push({ id: Date.now(), user, text, likes: 0 });
            store.put(v);
            document.getElementById('commentInput').value = "";
            renderComments(v.comments);
        };
    }

    function renderComments(arr) {
        const list = document.getElementById('commentsList');
        list.innerHTML = "";
        arr.forEach(c => {
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `<p><b>@${c.user}</b>: ${c.text}</p>`;
            list.prepend(div);
        });
    }

    function saveLike() {
        if(!currentVideoId) return;
        const store = db.transaction(["videos"], "readwrite").objectStore("videos");
        store.get(currentVideoId).onsuccess = e => {
            const v = e.target.result; v.likes++;
            if(v.likes === 100) { document.getElementById('achievement').style.display='block'; setTimeout(()=>document.getElementById('achievement').style.display='none', 5000); }
            store.put(v); document.getElementById('likeDisplay').innerText = v.likes;
        };
    }

    function markAsWatched() {
        if(!currentVideoId) return;
        const store = db.transaction(["videos"], "readwrite").objectStore("videos");
        store.get(currentVideoId).onsuccess = e => {
            const v = e.target.result; v.views++; store.put(v);
        };
    }

    function getTimeAgo(t) {
        const s = Math.floor((Date.now() - t) / 1000);
        if (s < 60) return `hace ${s} seg`;
        return `hace ${Math.floor(s/60)} min`;
    }

    function addMoreVideos() {
        const grid = document.getElementById('recommendGrid');
        for(let i=0; i<4; i++) {
            const v = Math.floor(Math.random()*2000000+445000);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="thumb" style="background-image:url('https://picsum.photos{Math.random()}')"></div><h4>Tendencia</h4><p>${v >= 1000000 ? (v/1000000).toFixed(1)+' M' : (v/1000).toFixed(0)+' k'} vistas</p>`;
            grid.appendChild(card);
        }
    }

    window.onscroll = () => { if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) addMoreVideos(); };
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
