<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tube - Comunidad en Vivo</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; }
        header { position: fixed; top: 0; width: 100%; height: 56px; background: #0f0f0f; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 1000; border-bottom: 1px solid #222; }
        .yt-icon { width: 30px; height: 22px; background: #ff0000; border-radius: 6px; display: flex; justify-content: center; align-items: center; margin-right: 6px; }
        .yt-icon::after { content: ""; border-left: 8px solid white; border-top: 5px solid transparent; border-bottom: 5px solid transparent; margin-left: 2px; }
        .logo-text { font-size: 1.25rem; font-weight: bold; }
        .btn { border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-red { background: #cc0000; color: white; }
        #userBadge { color: #3ea6ff; font-weight: bold; cursor: pointer; text-decoration: underline; margin-right: 10px; }
        main { padding-top: 80px; max-width: 1100px; margin: 0 auto; padding-inline: 20px; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; height: 100%; }
        
        /* Contador de Canales Real-Time */
        .live-stats { background: #1a1a1a; padding: 10px 15px; border-radius: 10px; margin-top: 10px; display: inline-flex; align-items: center; gap: 8px; border: 1px solid #333; }
        .live-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .video-actions { margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .comments-section { margin-top: 20px; padding-bottom: 40px; }
        .comment-input-box input { width: 100%; background: none; border: none; border-bottom: 1px solid #333; color: white; padding: 8px 0; outline: none; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; margin-bottom: 40px; }
        .card { cursor: pointer; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid transparent; background-size: cover; background-position: center; }
        .gold-border { border: 2px solid #ffd700 !important; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="logo-container" onclick="location.reload()">
        <div class="yt-icon"></div>
        <div class="logo-text">Tube</div>
    </div>
    <div>
        <span id="userBadge"></span>
        <button id="authBtn" class="btn" style="border:1px solid #3ea6ff; color:#3ea6ff; background:none" onclick="openModal('authModal')">Crear cuenta</button>
        <button id="uploadBtn" class="btn btn-red" style="display:none; margin-left:10px;" onclick="openModal('uploadModal')">Subir</button>
    </div>
</header>

<main>
    <div class="video-wrapper">
        <video id="mainPlayer" controls onended="markAsWatched()"></video>
    </div>
    
    <!-- Contador en Tiempo Real -->
    <div class="live-stats">
        <div class="live-dot"></div>
        <span style="font-size: 0.85rem; font-weight: 500;">
            <span id="channelCount">0</span> canales registrados en Tube
        </span>
    </div>

    <div class="video-actions">
        <div>
            <h1 id="displayTitle" style="font-size: 1.3rem;">Bienvenido</h1>
            <p id="displayVistas" style="color:#aaa; font-size: 0.85rem; margin-top: 4px;">0 vistas • --</p>
        </div>
        <button class="btn" style="background:#272727; color:white;" onclick="saveLike()">👍 <span id="likeDisplay">0</span></button>
    </div>

    <div class="comments-section">
        <h3>Comentarios</h3>
        <input type="text" id="commentInput" placeholder="Añade un comentario..." style="width:100%; background:none; border:none; border-bottom:1px solid #333; color:white; padding:10px 0; outline:none;" onkeypress="if(event.key === 'Enter') postComment()">
        <div id="commentsList"></div>
    </div>

    <h3>Mis Videos</h3>
    <div class="grid" id="myVideosGrid"></div>
    <h3>Tendencias</h3>
    <div class="grid" id="recommendGrid"></div>
</main>

<!-- Modales -->
<div id="authModal" class="modal"><div class="modal-box"><h3>Nombre del Canal</h3><input type="text" id="username" style="background:#121212; border:1px solid #333; color:white; padding:12px; border-radius:8px;"><button class="btn btn-red" onclick="register()">Aceptar</button></div></div>
<div id="uploadModal" class="modal"><div class="modal-box"><h3>Subir Video</h3><input type="text" id="vTitle" placeholder="Título" style="background:#121212; border:1px solid #333; color:white; padding:12px; border-radius:8px;"><input type="file" id="vFile" accept="video/*"><button class="btn btn-red" onclick="publish()">Publicar</button></div></div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        projectId: "TU_PROYECTO",
        appId: "TU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    // 1. ESCUCHAR CANALES EN TIEMPO REAL
    function listenChannels() {
        dbCloud.collection("users").onSnapshot(snapshot => {
            document.getElementById('channelCount').innerText = snapshot.size;
        });
    }

    // 2. REGISTRAR USUARIO EN LA NUBE
    async function register() {
        const u = document.getElementById('username').value;
        if(u) {
            localStorage.setItem('tubeUser', u);
            // Guardamos en Firebase para que el contador suba para todos
            await dbCloud.collection("users").doc(u).set({ name: u, joined: Date.now() });
            location.reload();
        }
    }

    // --- MANTENIENDO TODO LO ANTERIOR (IndexedDB) ---
    let db;
    let currentVideoId = null;
    const request = indexedDB.open("TubeDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("videos", { keyPath: "id" });
    request.onsuccess = e => { db = e.target.result; renderMyVideos(); };

    function publish() {
        const f = document.getElementById('vFile').files;
        const t = document.getElementById('vTitle').value;
        if(f && t) {
            const id = Date.now();
            const transaction = db.transaction(["videos"], "readwrite");
            transaction.objectStore("videos").add({ id, title: t, file: f, timestamp: Date.now(), likes: 0, views: 0, comments: [] });
            transaction.oncomplete = () => location.reload();
        }
    }

    function playVideo(id) {
        db.transaction(["videos"], "readonly").objectStore("videos").get(id).onsuccess = e => {
            const v = e.target.result;
            currentVideoId = v.id;
            document.getElementById('mainPlayer').src = URL.createObjectURL(v.file);
            document.getElementById('displayTitle').innerText = v.title;
            document.getElementById('displayVistas').innerText = `${v.views} vistas • hace ${Math.floor((Date.now()-v.timestamp)/60000)} min`;
            document.getElementById('likeDisplay').innerText = v.likes;
            document.getElementById('mainPlayer').play();
        };
    }

    function renderMyVideos() {
        const grid = document.getElementById('myVideosGrid');
        grid.innerHTML = "";
        db.transaction(["videos"], "readonly").objectStore("videos").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                const v = cursor.value;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => playVideo(v.id);
                card.innerHTML = `<div class="thumb ${v.likes >= 100 ? 'gold-border' : ''}" style="background:#222">▶</div><h4>${v.title}</h4><p>${v.views} vistas</p>`;
                grid.prepend(card);
                cursor.continue();
            }
        };
    }

    window.onload = () => {
        const u = localStorage.getItem('tubeUser');
        if(u) {
            document.getElementById('userBadge').innerText = u;
            document.getElementById('authBtn').style.display = 'none';
            document.getElementById('uploadBtn').style.display = 'inline-block';
        }
        listenChannels(); // Iniciamos el contador real
        // Cargar recomendaciones falsas
        for(let i=0; i<4; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="thumb" style="background-image:url('https://picsum.photos{i}')"></div><h4>Tendencia</h4><p>1.2 M vistas</p>`;
            document.getElementById('recommendGrid').appendChild(card);
        }
    };

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
