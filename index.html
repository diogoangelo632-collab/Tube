<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tube - Video, Logros y Comentarios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; }
        header { position: fixed; top: 0; width: 100%; height: 56px; background: #0f0f0f; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 1000; border-bottom: 1px solid #222; }
        .yt-icon { width: 30px; height: 22px; background: #ff0000; border-radius: 6px; display: flex; justify-content: center; align-items: center; margin-right: 6px; }
        .yt-icon::after { content: ""; border-left: 8px solid white; border-top: 5px solid transparent; border-bottom: 5px solid transparent; margin-left: 2px; }
        .logo-text { font-size: 1.25rem; font-weight: bold; cursor: pointer; }
        .btn { border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-red { background: #cc0000; color: white; }
        #userBadge { color: #3ea6ff; font-weight: bold; cursor: pointer; text-decoration: underline; margin-right: 10px; }
        main { padding-top: 80px; max-width: 1100px; margin: 0 auto; padding-inline: 20px; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; height: 100%; }
        .video-actions { margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #333; padding-bottom: 15px; }
        
        /* Sección Comentarios */
        .comments-section { margin-top: 20px; padding-bottom: 40px; }
        .comment-input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input-box input { flex: 1; background: none; border: none; border-bottom: 1px solid #333; color: white; padding: 5px 0; outline: none; }
        .comment-input-box input:focus { border-bottom: 2px solid white; }
        .comment-item { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .comment-author { font-weight: bold; font-size: 0.9rem; }
        .comment-text { font-size: 0.95rem; }
        .comment-footer { display: flex; gap: 15px; font-size: 0.8rem; color: #aaa; align-items: center; }
        .comment-react { cursor: pointer; }
        .comment-react:hover { color: white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; margin-bottom: 40px; }
        .card { cursor: pointer; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid transparent; background-size: cover; background-position: center; }
        .gold-border { border: 2px solid #ffd700 !important; box-shadow: 0 0 10px #ffd700; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        input { background: #121212; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; }
        .like-btn { background:#272727; border-radius:20px; padding:8px 15px; border:none; color:white; cursor:pointer; }
        #achievement { display: none; position: fixed; top: 70px; right: 20px; background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 15px 25px; border-radius: 10px; font-weight: bold; z-index: 3000; animation: slideIn 0.5s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="achievement">🏆 ¡Logro! Conseguiste 100 likes en este video</div>

<header>
    <div class="logo-container" onclick="location.reload()">
        <div class="yt-icon"></div>
        <div class="logo-text">Tube</div>
    </div>
    <div>
        <span id="userBadge" onclick="showStats()"></span>
        <button id="authBtn" class="btn" style="border:1px solid #3ea6ff; color:#3ea6ff; background:none" onclick="openModal('authModal')">Crear cuenta</button>
        <button id="uploadBtn" class="btn btn-red" style="display:none; margin-left:10px;" onclick="openModal('uploadModal')">Subir</button>
    </div>
</header>

<main>
    <div class="video-wrapper">
        <video id="mainPlayer" controls onended="markAsWatched()"></video>
    </div>
    <div class="video-actions">
        <div>
            <h1 id="displayTitle">Bienvenido a Tube</h1>
            <p id="displayVistas" style="color:#aaa; font-size: 0.85rem; margin-top: 4px;">0 vistas • --</p>
        </div>
        <button class="like-btn" onclick="saveLike()">👍 <span id="likeDisplay">0</span></button>
    </div>

    <!-- SECCIÓN COMENTARIOS -->
    <div class="comments-section" id="commentsSection" style="display: none;">
        <h3>Comentarios</h3>
        <div class="comment-input-box">
            <input type="text" id="commentInput" placeholder="Añade un comentario..." onkeypress="if(event.key === 'Enter') postComment()">
        </div>
        <div id="commentsList"></div>
    </div>

    <h3 style="margin-top:20px">Mis Videos (Canal)</h3>
    <div class="grid" id="myVideosGrid"></div>
    <h3 style="margin-top:30px">Tendencias Globales</h3>
    <div class="grid" id="recommendGrid"></div>
</main>

<div id="statsModal" class="modal"><div class="modal-box"><h2 id="statsName">Canal</h2><p style="font-size: 1.5rem; margin: 10px 0;">Likes: <span id="totalLikes" style="color:#ffd700">0</span></p><button class="btn btn-red" onclick="closeModal('statsModal')">Cerrar</button></div></div>
<div id="authModal" class="modal"><div class="modal-box"><h3>Nombre del Canal</h3><input type="text" id="username"><button class="btn btn-red" onclick="register()">Aceptar</button></div></div>
<div id="uploadModal" class="modal"><div class="modal-box"><h3>Subir Video</h3><input type="text" id="vTitle" placeholder="Título"><input type="file" id="vFile" accept="video/*"><button id="publishBtn" class="btn btn-red" onclick="publish()">Publicar</button></div></div>

<script>
    let db;
    let currentVideoId = null;

    const request = indexedDB.open("TubeDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("videos", { keyPath: "id" });
    };
    request.onsuccess = e => { db = e.target.result; renderMyVideos(); };

    function getTimeAgo(t) {
        const d = Math.floor((Date.now() - t) / 1000);
        if (d < 60) return `hace ${d} seg`;
        if (d < 3600) return `hace ${Math.floor(d / 60)} min`;
        return `hace ${Math.floor(d / 3600)} h`;
    }

    function formatViews(n) { return n >= 1000000 ? (n / 1000000).toFixed(1) + ' M' : (n / 1000).toFixed(0) + ' k'; }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function register() {
        const u = document.getElementById('username').value;
        if(u) { localStorage.setItem('tubeUser', u); location.reload(); }
    }

    function publish() {
        const f = document.getElementById('vFile').files;
        const t = document.getElementById('vTitle').value;
        if(f && t) {
            document.getElementById('publishBtn').innerText = "Guardando...";
            const id = Date.now();
            const transaction = db.transaction(["videos"], "readwrite");
            transaction.objectStore("videos").add({ id, title: t, file: f, timestamp: Date.now(), likes: 0, views: 0, comments: [] });
            transaction.oncomplete = () => location.reload();
        }
    }

    function renderMyVideos() {
        const grid = document.getElementById('myVideosGrid');
        grid.innerHTML = "";
        const transaction = db.transaction(["videos"], "readonly");
        transaction.objectStore("videos").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                const v = cursor.value;
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => playVideo(v.id);
                const goldClass = v.likes >= 100 ? 'gold-border' : '';
                card.innerHTML = `<div class="thumb ${goldClass}" style="background:#222">▶</div><h4>${v.title}</h4><p>${v.views} vistas • ${getTimeAgo(v.timestamp)}</p>`;
                grid.prepend(card);
                cursor.continue();
            }
        };
    }

    function playVideo(id) {
        const transaction = db.transaction(["videos"], "readonly");
        transaction.objectStore("videos").get(id).onsuccess = e => {
            const v = e.target.result;
            currentVideoId = v.id;
            document.getElementById('mainPlayer').src = URL.createObjectURL(v.file);
            document.getElementById('displayTitle').innerText = v.title;
            document.getElementById('displayVistas').innerText = `${v.views} vistas • ${getTimeAgo(v.timestamp)}`;
            document.getElementById('likeDisplay').innerText = v.likes;
            document.getElementById('commentsSection').style.display = 'block';
            renderComments(v.comments);
            document.getElementById('mainPlayer').play();
            window.scrollTo(0,0);
        };
    }

    function postComment() {
        const text = document.getElementById('commentInput').value;
        const user = localStorage.getItem('tubeUser') || "Anónimo";
        if(!text) return;

        const transaction = db.transaction(["videos"], "readwrite");
        const store = transaction.objectStore("videos");
        store.get(currentVideoId).onsuccess = e => {
            const v = e.target.result;
            if(!v.comments) v.comments = [];
            v.comments.push({ id: Date.now(), author: user, text: text, likes: 0 });
            store.put(v);
            document.getElementById('commentInput').value = "";
            renderComments(v.comments);
        };
    }

    function renderComments(comments) {
        const list = document.getElementById('commentsList');
        list.innerHTML = "";
        if(!comments) return;
        comments.forEach(c => {
            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `
                <div class="comment-author">@${c.author}</div>
                <div class="comment-text">${c.text}</div>
                <div class="comment-footer">
                    <span class="comment-react" onclick="reactComment(${c.id}, 'like')">👍 ${c.likes}</span>
                    <span class="comment-react" onclick="reactComment(${c.id}, 'dislike')">👎</span>
                </div>
            `;
            list.prepend(item);
        });
    }

    function reactComment(cId, type) {
        const transaction = db.transaction(["videos"], "readwrite");
        const store = transaction.objectStore("videos");
        store.get(currentVideoId).onsuccess = e => {
            const v = e.target.result;
            const comment = v.comments.find(c => c.id === cId);
            if(type === 'like') comment.likes++;
            store.put(v);
            renderComments(v.comments);
        };
    }

    function saveLike() {
        const transaction = db.transaction(["videos"], "readwrite");
        const store = transaction.objectStore("videos");
        store.get(currentVideoId).onsuccess = e => {
            const v = e.target.result;
            v.likes++;
            if(v.likes === 100) { document.getElementById('achievement').style.display = 'block'; setTimeout(() => document.getElementById('achievement').style.display = 'none', 5000); }
            store.put(v);
            document.getElementById('likeDisplay').innerText = v.likes;
            renderMyVideos();
        };
    }

    function markAsWatched() {
        const transaction = db.transaction(["videos"], "readwrite");
        const store = transaction.objectStore("videos");
        store.get(currentVideoId).onsuccess = e => {
            const v = e.target.result; v.views++; store.put(v);
        };
    }

    function showStats() {
        const u = localStorage.getItem('tubeUser');
        let total = 0;
        db.transaction(["videos"]).objectStore("videos").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if(cursor) { total += cursor.value.likes; cursor.continue(); }
            else { document.getElementById('statsName').innerText = "Canal de " + u; document.getElementById('totalLikes').innerText = total; openModal('statsModal'); }
        };
    }

    window.onload = () => {
        const u = localStorage.getItem('tubeUser');
        if(u) { document.getElementById('userBadge').innerText = u; document.getElementById('authBtn').style.display = 'none'; document.getElementById('uploadBtn').style.display = 'inline-block'; }
        for(let i=0; i<8; i++) {
            const v = Math.floor(Math.random() * (2400000 - 445000) + 445000);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="thumb" style="background-image:url('https://picsum.photos{Math.random()}')"></div><h4>Global</h4><p>${formatViews(v)} vistas</p>`;
            document.getElementById('recommendGrid').appendChild(card);
        }
    };
</script>
</body>
</html>
